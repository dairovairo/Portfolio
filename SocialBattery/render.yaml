# ══════════════════════════════════════════════════════════════════
#  SocialBattery — Render.com Blueprint
#  Docs: https://render.com/docs/blueprint-spec
# ══════════════════════════════════════════════════════════════════

services:
  # ── Backend (Node.js API) ──────────────────────────────────────
  - type: web
    name: socialbattery-server
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: false          # lo pones manualmente en el dashboard
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: CLIENT_URL
        sync: false          # URL del Static Site (lo sabes tras el primer deploy)
    healthCheckPath: /api/health

  # ── Frontend (React SPA) ───────────────────────────────────────
  - type: web
    name: socialbattery-client
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: VITE_API_URL
        sync: false          # URL del Web Service + /api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
